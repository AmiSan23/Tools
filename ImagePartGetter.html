<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Part Getter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 0.95rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title svg {
            width: 20px;
            height: 20px;
            color: #00d4ff;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }

        .upload-area.dragover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            color: #00d4ff;
        }

        .upload-text {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 4px;
        }

        .upload-hint {
            font-size: 0.85rem;
            color: #666;
        }

        #fileInput {
            display: none;
        }

        /* Image Area */
        .image-container {
            position: relative;
            display: none;
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container.has-image {
            display: flex;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
        }

        #uploadedImage {
            max-width: 100%;
            max-height: 600px;
            display: block;
        }

        .grid-selection {
            position: absolute;
            border: 3px solid #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            cursor: move;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3),
                        inset 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .grid-selection::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 10px,
                rgba(0, 212, 255, 0.1) 10px,
                rgba(0, 212, 255, 0.1) 11px
            ),
            repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10px,
                rgba(0, 212, 255, 0.1) 10px,
                rgba(0, 212, 255, 0.1) 11px
            );
        }

        .grid-selection .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #00d4ff;
            border: 2px solid #fff;
            border-radius: 2px;
        }

        .grid-selection .resize-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .grid-selection .resize-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .grid-selection .resize-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .grid-selection .resize-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
        .grid-selection .resize-handle.n { top: -6px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
        .grid-selection .resize-handle.s { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
        .grid-selection .resize-handle.w { left: -6px; top: 50%; transform: translateY(-50%); cursor: w-resize; }
        .grid-selection .resize-handle.e { right: -6px; top: 50%; transform: translateY(-50%); cursor: e-resize; }

        /* Controls Panel */
        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Input Group */
        .input-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-field label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        .input-field input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        /* Arrow Buttons */
        .arrow-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .arrow-row {
            display: flex;
            gap: 8px;
        }

        .arrow-btn {
            width: 44px;
            height: 44px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            color: #00d4ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .arrow-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: scale(1.05);
        }

        .arrow-btn:active {
            transform: scale(0.95);
        }

        .arrow-btn svg {
            width: 20px;
            height: 20px;
        }

        .arrow-placeholder {
            width: 44px;
            height: 44px;
        }

        /* Size Controls */
        .size-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .size-btn {
            flex: 1;
            padding: 10px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            color: #00d4ff;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .size-btn:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        /* Preview Area */
        .preview-container {
            margin-top: 8px;
        }

        .preview-box {
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .preview-box canvas {
            max-width: 100%;
            max-height: 200px;
        }

        .preview-placeholder {
            color: #444;
            font-size: 0.9rem;
        }

        /* Download Button */
        .download-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            margin-top: 16px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Image Info */
        .image-info {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 0.85rem;
            color: #888;
        }

        .image-info span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .image-info svg {
            width: 16px;
            height: 16px;
            color: #00d4ff;
        }

        /* Status Bar */
        .status-bar {
            margin-top: 20px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast svg {
            width: 20px;
            height: 20px;
            color: #4ade80;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .main-content {
                gap: 16px;
            }

            .panel {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Image Part Getter</h1>
            <p class="subtitle">Select, crop, and download any part of your image with precision</p>
        </header>

        <div class="main-content">
            <div class="left-panel">
                <div class="panel">
                    <div class="upload-area" id="uploadArea">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p class="upload-text">Drop your image here or click to upload</p>
                        <p class="upload-hint">Supports JPG, PNG, GIF, WebP</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*">

                    <div class="image-container" id="imageContainer">
                        <div class="image-wrapper" id="imageWrapper">
                            <img id="uploadedImage" alt="Uploaded image">
                            <div class="grid-selection" id="gridSelection">
                                <div class="resize-handle nw"></div>
                                <div class="resize-handle n"></div>
                                <div class="resize-handle ne"></div>
                                <div class="resize-handle w"></div>
                                <div class="resize-handle e"></div>
                                <div class="resize-handle sw"></div>
                                <div class="resize-handle s"></div>
                                <div class="resize-handle se"></div>
                            </div>
                        </div>
                    </div>

                    <div class="image-info" id="imageInfo" style="display: none;">
                        <span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            </svg>
                            <span id="imageDimensions">0 × 0</span>
                        </span>
                        <span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            </svg>
                            <span id="fileName">No file</span>
                        </span>
                    </div>

                    <div class="status-bar" id="statusBar">
                        <div class="status-dot"></div>
                        <span>Selection data auto-saved to browser storage</span>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="panel controls-panel">
                    <div>
                        <div class="panel-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                            Position & Size
                        </div>
                        <div class="input-group">
                            <div class="input-field">
                                <label>X Position</label>
                                <input type="number" id="inputX" value="0" min="0">
                            </div>
                            <div class="input-field">
                                <label>Y Position</label>
                                <input type="number" id="inputY" value="0" min="0">
                            </div>
                            <div class="input-field">
                                <label>Width</label>
                                <input type="number" id="inputW" value="100" min="1">
                            </div>
                            <div class="input-field">
                                <label>Height</label>
                                <input type="number" id="inputH" value="100" min="1">
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="panel-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            Move Selection
                        </div>
                        <div class="arrow-controls">
                            <div class="arrow-row">
                                <div class="arrow-placeholder"></div>
                                <button class="arrow-btn" id="btnUp" title="Move Up">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="18 15 12 9 6 15"/>
                                    </svg>
                                </button>
                                <div class="arrow-placeholder"></div>
                            </div>
                            <div class="arrow-row">
                                <button class="arrow-btn" id="btnLeft" title="Move Left">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="15 18 9 12 15 6"/>
                                    </svg>
                                </button>
                                <div class="arrow-placeholder"></div>
                                <button class="arrow-btn" id="btnRight" title="Move Right">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="9 18 15 12 9 6"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="arrow-row">
                                <div class="arrow-placeholder"></div>
                                <button class="arrow-btn" id="btnDown" title="Move Down">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"/>
                                    </svg>
                                </button>
                                <div class="arrow-placeholder"></div>
                            </div>
                        </div>
                        <div class="size-controls">
                            <button class="size-btn" id="btnExpand">Expand +10</button>
                            <button class="size-btn" id="btnShrink">Shrink -10</button>
                        </div>
                    </div>

                    <div>
                        <div class="panel-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            Preview
                        </div>
                        <div class="preview-container">
                            <div class="preview-box" id="previewBox">
                                <span class="preview-placeholder">Select an area to preview</span>
                                <canvas id="previewCanvas" style="display: none;"></canvas>
                            </div>
                        </div>
                        <button class="download-btn" id="downloadBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Download Selected Part
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span id="toastMessage">Saved!</span>
    </div>

    <script>
        // State Management
        const state = {
            image: null,
            imageWidth: 0,
            imageHeight: 0,
            selection: { x: 0, y: 0, w: 100, h: 100 },
            isDragging: false,
            isResizing: false,
            resizeHandle: null,
            dragStart: { x: 0, y: 0 },
            selectionStart: { x: 0, y: 0, w: 0, h: 0 },
            step: 1,
            lastImageData: null
        };

        // DOM Elements
        const elements = {
            uploadArea: document.getElementById('uploadArea'),
            fileInput: document.getElementById('fileInput'),
            imageContainer: document.getElementById('imageContainer'),
            imageWrapper: document.getElementById('imageWrapper'),
            uploadedImage: document.getElementById('uploadedImage'),
            gridSelection: document.getElementById('gridSelection'),
            inputX: document.getElementById('inputX'),
            inputY: document.getElementById('inputY'),
            inputW: document.getElementById('inputW'),
            inputH: document.getElementById('inputH'),
            btnUp: document.getElementById('btnUp'),
            btnDown: document.getElementById('btnDown'),
            btnLeft: document.getElementById('btnLeft'),
            btnRight: document.getElementById('btnRight'),
            btnExpand: document.getElementById('btnExpand'),
            btnShrink: document.getElementById('btnShrink'),
            previewBox: document.getElementById('previewBox'),
            previewCanvas: document.getElementById('previewCanvas'),
            downloadBtn: document.getElementById('downloadBtn'),
            imageInfo: document.getElementById('imageInfo'),
            imageDimensions: document.getElementById('imageDimensions'),
            fileName: document.getElementById('fileName'),
            toast: document.getElementById('toast'),
            toastMessage: document.getElementById('toastMessage')
        };

        // LocalStorage Keys
        const STORAGE_KEY = 'imagePartGetter';
        const SELECTION_KEY = `${STORAGE_KEY}_selection`;

        // Initialize
        function init() {
            loadSavedSelection();
            setupEventListeners();
        }

        // Load saved selection from localStorage
        function loadSavedSelection() {
            const saved = localStorage.getItem(SELECTION_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    state.selection = data.selection;
                    state.lastImageData = data.imageData || null;
                    updateInputFields();
                } catch (e) {
                    console.warn('Failed to load saved selection');
                }
            }
        }

        // Save selection to localStorage
        function saveSelection() {
            const data = {
                selection: { ...state.selection },
                imageData: state.lastImageData
            };
            localStorage.setItem(SELECTION_KEY, JSON.stringify(data));
        }

        // Update input fields from state
        function updateInputFields() {
            elements.inputX.value = Math.round(state.selection.x);
            elements.inputY.value = Math.round(state.selection.y);
            elements.inputW.value = Math.round(state.selection.w);
            elements.inputH.value = Math.round(state.selection.h);
        }

        // Update state from input fields
        function updateStateFromInputs() {
            state.selection.x = parseInt(elements.inputX.value) || 0;
            state.selection.y = parseInt(elements.inputY.value) || 0;
            state.selection.w = parseInt(elements.inputW.value) || 1;
            state.selection.h = parseInt(elements.inputH.value) || 1;
            updateGridSelection();
            updatePreview();
            saveSelection();
        }

        // Update grid selection position and size
        function updateGridSelection() {
            const img = elements.uploadedImage;
            const displayWidth = img.clientWidth;
            const displayHeight = img.clientHeight;

            const scaleX = displayWidth / state.imageWidth;
            const scaleY = displayHeight / state.imageHeight;

            let x = state.selection.x * scaleX;
            let y = state.selection.y * scaleY;
            let w = state.selection.w * scaleX;
            let h = state.selection.h * scaleY;

            // Constrain to image bounds
            x = Math.max(0, Math.min(x, displayWidth - w));
            y = Math.max(0, Math.min(y, displayHeight - h));
            w = Math.min(w, displayWidth - x);
            h = Math.min(h, displayHeight - y);

            elements.gridSelection.style.left = `${x}px`;
            elements.gridSelection.style.top = `${y}px`;
            elements.gridSelection.style.width = `${w}px`;
            elements.gridSelection.style.height = `${h}px`;

            // Update input fields with actual values
            elements.inputX.value = Math.round(state.selection.x);
            elements.inputY.value = Math.round(state.selection.y);
            elements.inputW.value = Math.round(state.selection.w);
            elements.inputH.value = Math.round(state.selection.h);
        }

        // Update preview canvas
        function updatePreview() {
            if (!state.image) return;

            const canvas = elements.previewCanvas;
            const ctx = canvas.getContext('2d');

            const { x, y, w, h } = state.selection;

            // Set canvas size to selection size
            canvas.width = w;
            canvas.height = h;

            // Draw the cropped portion
            ctx.drawImage(state.image, x, y, w, h, 0, 0, w, h);

            // Show canvas, hide placeholder
            canvas.style.display = 'block';
            elements.previewBox.querySelector('.preview-placeholder').style.display = 'none';
        }

        // Show toast notification
        function showToast(message) {
            elements.toastMessage.textContent = message;
            elements.toast.classList.add('show');
            setTimeout(() => {
                elements.toast.classList.remove('show');
            }, 2000);
        }

        // File upload handling
        function handleFileUpload(file) {
            if (!file || !file.type.startsWith('image/')) {
                showToast('Please upload a valid image file');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    state.image = img;
                    state.imageWidth = img.width;
                    state.imageHeight = img.height;

                    elements.uploadedImage.src = e.target.result;
                    elements.imageContainer.classList.add('has-image');

                    // Update image info

    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
