  <body>
   <button id="str" class="btn--default block" data-action="alphabetize">Alphabetize</button>
   <button id="num" class="btn--default block" data-action="numerize">Numerize</button>
   <button id="rstr" class="btn--default block" data-action="reverse">Numerize</button>
			<textarea class="form__input" data-action="input-list" placeholder="Alphabetize your text here..."></textarea>
			<textarea class="form__input" data-action="num-list" placeholder="..."></textarea>

   <script>
    const Str = document.querySelector("#str");
const Num = document.querySelector("#num");
const RStr = document.querySelector("#rstr");
var txt = document.querySelector("[data-action=input-list]");
var num = document.querySelector("[data-action=num-list]");
var rstr = document.querySelector("[data-action=rstr-list]");

if (localStorage.getItem("alphabetize")) {
  txt.value = localStorage.getItem("alphabetize");
}
document.querySelector("[data-action=alphabetize]").onclick = function() {
  txt.value = (txt.value.split("\n").sort(caseInsensitive).join("\n"))
  function caseInsensitive(a, b) {
    return a.toLowerCase().localeCompare(b.toLowerCase())
  }
  localStorage.setItem("alphabetize", txt.value);
}
if (localStorage.getItem("reverse")) {
  txt.value = localStorage.getItem("reverse");
}
document.querySelector("[data-action=rstr]").onclick = function() {
  txt.value = (txt.value.split("\n").sort(caseInsensitive).join("\n"))
  function caseInsensitive(a, b) {
    return a.toLowerCase().localeCompare(b.toLowerCase())
  }
  localStorage.setItem("reverse", txt.value);
}
if (localStorage.getItem("numerize")) {
  num.value = localStorage.getItem("numerize");
}
document.querySelector("[data-action=numerize]").onclick = function() {
  let numR=num.value.split("\n");
  let parN=[];
  for (let prop in numR) {
  	parN.push(Number.parseInt(numR[prop]));
  }
  parN.sort(function(a, b) {
  	return a - b;
  });
  let ptxt=``;
  for (let pp in parN) {
  	ptxt+=`${parN[pp]}\n`;
  }
  num.value=ptxt;
  localStorage.setItem("numerize", num.value);
}
