<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Alphabetizer & Sorter</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 { margin-top: 0; font-size: 1.5rem; color: var(--primary); }

        .control-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        label { font-size: 0.875rem; font-weight: 600; display: block; margin-bottom: 0.5rem; }

        select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        textarea {
            height: 250px;
            font-family: 'Fira Code', monospace;
            resize: vertical;
            margin-bottom: 1rem;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.5rem;
        }

        button {
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button.secondary { background: #64748b; }

        #stats {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Sortir Master Pro</h1>
    
    <div class="control-group">
        <div>
            <label>Mode Prioritas</label>
            <select id="sortOrder">
                <option value="ans">Alphabet - Number - Symbol</option>
                <option value="san">Symbol - Alphabet - Number</option>
                <option value="nsa">Number - Symbol - Alphabet</option>
                <option value="asn">Alphabet - Symbol - Number</option>
                <option value="sna">Symbol - Number - Alphabet</option>
                <option value="nas">Number - Alphabet - Symbol</option>
            </select>
        </div>
        <div>
            <label>Arah Urutan</label>
            <select id="direction">
                <option value="asc">Ascending (A-Z / 1-10)</option>
                <option value="desc">Descending (Z-A / 10-1)</option>
            </select>
        </div>
    </div>

    <textarea id="inputList" placeholder="Masukkan teks di sini, pisahkan dengan baris baru..."></textarea>

    <div class="button-grid">
        <button onclick="processSort()">Sortir Sekarang</button>
        <button class="secondary" onclick="clearAll()">Hapus Semua</button>
        <button class="secondary" onclick="copyText()">Salin Hasil</button>
    </div>

    <div id="stats">Baris terdeteksi: <span id="lineCount">0</span></div>
</div>

<script>
    const inputArea = document.getElementById('inputList');
    const sortOrder = document.getElementById('sortOrder');
    const direction = document.getElementById('direction');
    const lineCount = document.getElementById('lineCount');

    // Load dari LocalStorage jika ada
    if (localStorage.getItem("savedText")) {
        inputArea.value = localStorage.getItem("savedText");
        updateCount();
    }

    inputArea.addEventListener('input', updateCount);

    function updateCount() {
        const lines = inputArea.value.split('\n').filter(l => l.trim() !== "");
        lineCount.innerText = lines.length;
    }

    function getType(str, orderValue) {
        if (!str) return 99;
        const firstChar = str.trim().charAt(0);
        
        const isAlpha = /[a-zA-Z]/.test(firstChar);
        const isNum = /[0-9]/.test(firstChar);
        
        // Ambil urutan berdasarkan value dropdown (misal: "ans")
        const mapping = {
            'a': isAlpha,
            'n': isNum,
            's': !isAlpha && !isNum
        };

        const priorities = orderValue.split(''); // ['a', 'n', 's']
        if (mapping[priorities[0]]) return 1;
        if (mapping[priorities[1]]) return 2;
        if (mapping[priorities[2]]) return 3;
        return 4;
    }

    function processSort() {
        let lines = inputArea.value.split('\n').filter(line => line.trim() !== "");
        const order = sortOrder.value;
        const dir = direction.value;

        lines.sort((a, b) => {
            const typeA = getType(a, order);
            const typeB = getType(b, order);

            // Jika tipe berbeda, urutkan berdasarkan prioritas tipe
            if (typeA !== typeB) {
                return typeA - typeB;
            }

            // Jika tipe sama, gunakan Natural Sort (1, 2, 10)
            return a.localeCompare(b, undefined, {
                numeric: true,
                sensitivity: 'base'
            });
        });

        if (dir === 'desc') lines.reverse();

        inputArea.value = lines.join('\n');
        localStorage.setItem("savedText", inputArea.value);
        updateCount();
    }

    function clearAll() {
        if(confirm("Hapus semua teks?")) {
            inputArea.value = "";
            localStorage.removeItem("savedText");
            updateCount();
        }
    }

    function copyText() {
        inputArea.select();
        document.execCommand('copy');
        alert("Teks berhasil disalin!");
    }
</script>

</body>
</html>
