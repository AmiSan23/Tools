<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple List Checker</title>
    <style>
        :root {
            --primary: #2ea44f;
            --bg: #f6f8fa;
            --border: #d0d7de;
            --text: #24292f;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .header-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: 1px solid rgba(27,31,36,0.15);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background-color: #2c974b; }
        button.danger { background-color: #cf222e; }
        button.danger:hover { background-color: #a40e26; }
        
        .lists-wrapper {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .list-box {
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .list-name {
            font-size: 16px;
            font-weight: bold;
            padding: 5px;
            border: 1px solid transparent;
        }
        .list-name:focus { border-color: var(--primary); outline: none; }
        textarea {
            height: 250px;
            resize: vertical;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: monospace;
            white-space: pre;
        }
        .results-section {
            margin-top: 30px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 10px;
            text-align: center;
        }
        th { background-color: var(--bg); }
        td:first-child { text-align: left; font-weight: bold; }
        .match { color: #2ea44f; font-weight: bold; }
        .diff { color: #cf222e; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Multiple List Checker</h1>
    <p>Paste your lists below (one item per line). Changes are saved automatically to your browser.</p>

    <div class="header-controls">
        <button onclick="addList()">+ Add New Column</button>
        <button onclick="compareLists()" style="background-color: #0969da;">Compare Lists</button>
        <button onclick="clearAll()" class="danger">Clear Data</button>
    </div>

    <div class="lists-wrapper" id="listsContainer">
        </div>

    <div class="results-section" id="resultsContainer" style="display: none;">
        <h2>Comparison Results</h2>
        <div id="tableContainer"></div>
    </div>

    <script>
        const container = document.getElementById('listsContainer');

        // 1. Initialize and Load from Local Storage
        function loadState() {
            const data = JSON.parse(localStorage.getItem('listCheckerData'));
            if (data && data.length > 0) {
                data.forEach(list => createColumn(list.name, list.content));
            } else {
                // Default starting point
                createColumn('List 1', '');
                createColumn('List 2', '');
            }
        }

        // 2. Save to Local Storage
        function saveState() {
            const data = [];
            document.querySelectorAll('.list-box').forEach(box => {
                data.push({
                    name: box.querySelector('.list-name').value,
                    content: box.querySelector('textarea').value
                });
            });
            localStorage.setItem('listCheckerData', JSON.stringify(data));
        }

        // 3. Create a Column UI
        function createColumn(name, content) {
            const box = document.createElement('div');
            box.className = 'list-box';
            
            box.innerHTML = `
                <input type="text" class="list-name" value="${name}" onkeyup="saveState()">
                <textarea placeholder="Paste items here...&#10;Line 1&#10;Line 2" onkeyup="saveState()">${content}</textarea>
                <button class="danger" onclick="removeColumn(this)">Remove List</button>
            `;
            container.appendChild(box);
        }

        function addList() {
            const currentCount = document.querySelectorAll('.list-box').length + 1;
            createColumn(`List ${currentCount}`, '');
            saveState();
        }

        function removeColumn(btn) {
            btn.parentElement.remove();
            saveState();
        }

        function clearAll() {
            if(confirm("Are you sure you want to clear all lists?")) {
                localStorage.removeItem('listCheckerData');
                container.innerHTML = '';
                document.getElementById('resultsContainer').style.display = 'none';
                loadState();
            }
        }

        // 4. Core Comparison Logic
        function compareLists() {
            const boxes = document.querySelectorAll('.list-box');
            if (boxes.length < 2) {
                alert("Please add at least 2 lists to compare.");
                return;
            }

            let allUniqueItems = new Set();
            let parsedLists = [];

            // Extract data
            boxes.forEach(box => {
                let listName = box.querySelector('.list-name').value;
                let rawText = box.querySelector('textarea').value;
                
                // Split by new line, remove empty spaces and blank lines
                let items = rawText.split('\n')
                                   .map(item => item.trim())
                                   .filter(item => item !== '');
                
                parsedLists.push({ name: listName, items: items });
                items.forEach(item => allUniqueItems.add(item));
            });

            // Build Results Table
            let html = `<table>
                <tr>
                    <th>Item</th>`;
            
            parsedLists.forEach(list => {
                html += `<th>${list.name}</th>`;
            });
            html += `<th>Status</th></tr>`;

            // Sort alphabetically for easy reading
            let sortedItems = Array.from(allUniqueItems).sort();

            sortedItems.forEach(item => {
                let rowHtml = `<tr><td>${item}</td>`;
                let matchCount = 0;

                parsedLists.forEach(list => {
                    if (list.items.includes(item)) {
                        rowHtml += `<td>✔️</td>`;
                        matchCount++;
                    } else {
                        rowHtml += `<td>❌</td>`;
                    }
                });

                let status = (matchCount === parsedLists.length) 
                    ? `<span class="match">All Match</span>` 
                    : `<span class="diff">Missing</span>`;
                
                rowHtml += `<td>${status}</td></tr>`;
                html += rowHtml;
            });

            html += `</table>`;

            document.getElementById('tableContainer').innerHTML = html;
            document.getElementById('resultsContainer').style.display = 'block';
        }

        // Boot up
        loadState();
    </script>
</body>
</html>
